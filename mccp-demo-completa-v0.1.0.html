<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>MCCP · Demo completa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/mccp-ui.css">
<style>
  html,body{height:100%}
  body{margin:0;height:100vh;overflow:hidden;background:var(--ink);color:var(--text);font-family:"Archivo",sans-serif;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
  /* top bar */
  .bar{flex:none;display:flex;align-items:center;gap:16px;padding:9px 16px;background:#0b1120;border-bottom:1px solid var(--line-2);z-index:5}
  .bar .brand{display:flex;align-items:center;gap:10px;flex:none}
  .bar .brand .mk{width:30px;height:30px;border-radius:9px;background:conic-gradient(from 140deg,var(--teal),var(--teal-deep) 60%,#0a3d36);display:grid;place-items:center;box-shadow:inset 0 0 0 1px rgba(255,255,255,.12)}
  .bar .brand .mk svg{width:17px;height:17px}
  .bar .brand .tt{line-height:1}
  .bar .brand .tt b{font-family:"Fraunces",serif;font-weight:500;font-size:13.5px;color:#fff;letter-spacing:.02em}
  .bar .brand .tt span{display:block;font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--teal);font-weight:600;margin-top:2px}
  .tabs{display:flex;gap:5px;background:#0a0f1a;border:1px solid var(--line);border-radius:12px;padding:4px;margin:0 auto;overflow-x:auto;max-width:100%;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tabs button{border:0;background:transparent;color:var(--muted);font-family:"Archivo";font-size:12.5px;font-weight:600;padding:7px 13px;border-radius:9px;cursor:pointer;display:flex;align-items:center;gap:8px;white-space:nowrap;transition:.15s}
  .tabs button .bg{width:20px;height:20px;border-radius:6px;display:grid;place-items:center;font-size:10.5px;font-weight:800;flex:none;background:#1a2236;color:#aeb9cc}
  .tabs button:hover{color:#cdd6e6}
  .tabs button.on{background:#141d31;color:#fff}
  .tabs button.on .bg{background:var(--teal);color:#04140f}
  .tabs button.on.gold .bg{background:var(--gold);color:#2a1d05}
  .tabs button.on.tealx .bg{background:#7fe3cf;color:#04140f}
  .bar .nav{display:flex;gap:6px;flex:none}
  .bar .nav button{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:#141d31;color:#cdd6e6;display:grid;place-items:center;cursor:pointer}
  .bar .nav button:hover{background:#1b2742}.bar .nav button:disabled{opacity:.35;cursor:default}
  .bar .nav button svg{width:16px;height:16px}
  .bar .ext{flex:none;display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted);text-decoration:none;border:1px solid var(--line);border-radius:9px;padding:7px 11px;transition:.15s}
  .bar .ext:hover{color:#cdd6e6;border-color:var(--line-2)}
  .bar .ext svg{width:14px;height:14px}
  /* progress strip */
  .prog{flex:none;height:3px;background:#0a0f1a;position:relative;overflow:hidden}
  .prog .fill{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,var(--teal),var(--gold));transition:width .35s ease}
  /* stage */
  .frameWrap{flex:1;min-height:0;position:relative;background:var(--ink)}
  iframe{width:100%;height:100%;border:0;display:block;background:var(--ink)}
  .bar .playall{flex:none;display:flex;align-items:center;gap:8px;font-family:"Archivo";font-size:12.5px;font-weight:700;border:0;border-radius:9px;padding:8px 14px;cursor:pointer;background:linear-gradient(120deg,#19c3a6,#0c5e51);color:#04140f}
  .bar .playall:hover{filter:brightness(1.07)}.bar .playall svg{width:15px;height:15px}
  @media(max-width:980px){.bar .playall span{display:none}}
  .loading{position:absolute;inset:0;display:grid;place-items:center;pointer-events:none;opacity:0;transition:.2s}
  .loading.on{opacity:1}
  .loading .sp{width:34px;height:34px;border-radius:50%;border:3px solid rgba(255,255,255,.12);border-top-color:var(--teal);animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .caption{flex:none;display:flex;align-items:center;justify-content:center;gap:10px;padding:7px 16px;background:#0b1120;border-top:1px solid var(--line);font-size:12px;color:var(--muted)}
  .caption b{color:#cdd6e6;font-weight:600}
  .caption .act{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--teal);font-weight:700}
  .caption .hint{margin-left:8px;color:var(--muted-2)}
  @media(max-width:820px){.bar .brand .tt,.bar .ext span{display:none}.tabs button .lbl{display:none}}
  .voicebtn{flex:none;width:38px;height:38px;border-radius:9px;border:1px solid var(--line-2);background:#141d31;color:#9fdccd;display:grid;place-items:center;cursor:pointer;transition:.15s}
  .voicebtn:hover{background:#1b2742}.voicebtn.off{color:#6b7a93}.voicebtn svg{width:18px;height:18px}
  .narrbar{flex:none;display:none;align-items:center;justify-content:center;gap:12px;padding:11px 18px;background:#0b1c1a;border-top:1px solid rgba(25,195,166,.28)}
  .narrbar.show{display:flex}
  .narrbar .ic{flex:none;color:var(--teal);display:grid;place-items:center}.narrbar .ic svg{width:20px;height:20px}
  #narrText{font-size:14px;color:#e6fbf5;line-height:1.45;max-width:1040px;text-align:center}
</style>
</head>
<body>
  <div class="bar">
    <div class="brand"><div class="mk"><svg viewBox="0 0 24 24" fill="none"><path d="M12 2l7 3v6c0 4.4-3 8.3-7 9-4-.7-7-4.6-7-9V5l7-3z" fill="#fff" opacity=".9"/><path d="M9 12l2 2 4-4" stroke="#0c5e51" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="tt"><b>MCCP</b><span>Demo completa</span></div></div>
    <div class="tabs" id="tabs"></div>
    <div class="nav"><button id="prev" aria-label="Anterior"><svg viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button><button id="next" aria-label="Siguiente"><svg viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button></div>
    <button class="voicebtn" id="voiceBtn" aria-label="Locución por voz" title="Locución por voz"><svg viewBox="0 0 24 24" fill="none"></svg></button>
    <button class="playall" id="playAll" aria-label="Reproducir todo"><svg viewBox="0 0 24 24" id="playAllIco"><path d="M7 5v14l11-7z" fill="#04140f"/></svg><span>Reproducir todo</span></button>
    <a class="ext" id="openTab" href="#" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" fill="none"><path d="M14 4h6v6M20 4l-9 9M18 14v5a1 1 0 01-1 1H5a1 1 0 01-1-1V7a1 1 0 011-1h5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg><span>Abrir solo</span></a>
  </div>
  <div class="prog"><div class="fill" id="progFill"></div></div>
  <div class="frameWrap">
    <iframe id="frame" title="Bloque de la demo"></iframe>
    <div class="loading on" id="loading"><div class="sp"></div></div>
  </div>
  <div class="narrbar" id="narrbar"><span class="ic"><svg viewBox="0 0 24 24" fill="none"><path d="M4 9v6h4l5 4V5L8 9H4z" fill="currentColor"/><path d="M16 8.5c1.4 1 1.4 6 0 7M18.7 6.5c2.4 2 2.4 9 0 11" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round"/></svg></span><span id="narrText"></span></div>
  <div class="caption"><span class="act" id="capAct">Bloque A</span><b id="capTitle">Backstage</b><span id="capDesc">configuración del Organismo</span><span class="hint">· navega dentro del bloque con su propio stepper</span></div>

<script>
(function(){
  var HASH = "";
  var blocks=[
    {k:"A",  cls:"",      file:"mccp-demo-fase-A-backstage-v0.1.0.html",   lbl:"Backstage",  act:"Bloque A", desc:"login · multi-tenant · canales · permisos"},
    {k:"B",  cls:"tealx", file:"mccp-demo-recorrido-v0.1.0.html",          lbl:"El salto",   act:"Bloque B", desc:"WhatsApp → sala securizada · 3 vistas + recorrido"},
    {k:"B+", cls:"tealx", file:"mccp-demo-fase-B-anadidos-v0.1.0.html",     lbl:"Operación",  act:"Bloque B", desc:"alta de Agente · permiso en vivo · tercero"},
    {k:"C",  cls:"gold",  file:"mccp-demo-fase-C-moderado-v0.1.0.html",     lbl:"Moderado",   act:"Bloque C", desc:"moderación en vivo · log"},
    {k:"D",  cls:"",      file:"mccp-demo-fase-D-soberania-v0.1.0.html",    lbl:"Soberanía",  act:"Bloque D", desc:"claro vs. cifrado · auditoría · retención"}
  ];
  var cur=0, TOTAL=blocks.length, nonce=0, allPlaying=false;
  var $=function(s){return document.querySelector(s)};
  var tabsEl=$("#tabs"), frame=$("#frame"), loading=$("#loading");

  // ---- locución por escena (la transición ocurre al terminar la frase) ----
  var NARR=[
    [ "Empezamos en la consola de MCCP. El administrador del Organismo accede con identidad y doble factor.",
      "La plataforma es multi-tenant: cada Organismo es un espacio aislado, con sus canales, usuarios y configuración. Abrimos el de UNICC.",
      "Damos de alta dos canales sobre WhatsApp: uno seguro, cifrado y con bot; y otro moderado, con moderación de contenido.",
      "Los vemos lado a lado: el canal seguro cifra y gobierna con BYOK; el moderado aplica políticas de moderación.",
      "Y definimos los permisos por rol: administrador, manager, agente e invitado, por grupos o de forma individual." ],
    [ "Pasamos al salto, el corazón de la demo. El Usuario entra por WhatsApp, el canal de siempre, y le recibe el bot.",
      "Plantea su consulta: necesita aportar documentación a su expediente.",
      "Como implica datos sensibles, el bot escala la conversación a un agente.",
      "La agente, Marta, toma la conversación y prepara una sala cifrada.",
      "Aquí está el salto: la agente abre una conversación securizada y envía la invitación por WhatsApp.",
      "El Usuario verifica su identidad con un Flow y un código que llega por SMS, en un factor separado del enlace.",
      "Ya verificado, entra a la sala securizada, sobre el mismo móvil, en un navegador integrado.",
      "Y aporta los adjuntos del expediente: imagen, nota de voz y PDF, todos cifrados.",
      "La agente añade una nota interna, invisible para el Usuario.",
      "Cierra la conversación: se archiva cifrada y el enlace queda invalidado." ],
    [ "Veamos la operación del equipo. El manager da de alta a una agente por correo.",
      "La agente crea su contraseña y entra con una vista limitada; el manager conserva el acceso completo.",
      "En la conversación, un dato del Usuario aparece enmascarado para la agente.",
      "Al conceder el permiso, el dato se revela en vivo y queda registrado quién lo vio y cuándo.",
      "Ahora sumamos a un tercero a la sala securizada.",
      "Se le invita por el mismo mecanismo: enlace seguro y código por SMS.",
      "Entra como invitado anonimizado, sin acceso al histórico.",
      "Y al finalizar, pierde el acceso: el enlace queda invalidado." ],
    [ "El segundo canal es el moderado: sin cifrado, con moderación activa.",
      "Cuando el Usuario envía contenido ofensivo, MCCP lo redacta y lo marca antes de llegar al agente, y avisa al Usuario.",
      "Todo queda en un log de moderación: hora, puntuación, texto redactado y acción." ],
    [ "Llegamos al cierre: la soberanía del dato. El operador autorizado lo ve en claro.",
      "Sin la clave, que custodia el Organismo, el contenido es ilegible; nada en claro en servidores de terceros.",
      "Y todo queda auditado de forma inmutable, con retención por finalidad que decide el Organismo." ]
  ];

  // ---- voz (Web Speech API) ----
  var hasTTS = ('speechSynthesis' in window);
  var voiceOn = hasTTS, esVoice=null, speakCancel=null;
  function pickVoice(){ if(!hasTTS) return; var vs=speechSynthesis.getVoices()||[]; esVoice = vs.filter(function(v){return /^es/i.test(v.lang);})[0] || vs.filter(function(v){return /spanish|español/i.test(v.name||"");})[0] || null; }
  if(hasTTS){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }
  function setVoiceIco(){ var b=$("#voiceBtn"); if(!b)return; b.classList.toggle("off",!voiceOn);
    b.querySelector("svg").innerHTML = voiceOn
      ? '<path d="M4 9v6h4l5 4V5L8 9H4z" fill="currentColor"/><path d="M16 8.5c1.4 1 1.4 6 0 7M18.7 6.5c2.4 2 2.4 9 0 11" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round"/>'
      : '<path d="M4 9v6h4l5 4V5L8 9H4z" fill="currentColor"/><path d="M16 9.5l5 5M21 9.5l-5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>'; }
  function setSubtitle(t){ var bar=$("#narrbar"); if(!bar)return; bar.classList.add("show"); $("#narrText").textContent=t||""; }
  function clearSubtitle(){ var bar=$("#narrbar"); if(bar) bar.classList.remove("show"); }
  function estDur(t){ return Math.max(3000,(t?t.length:0)*72); }
  function speak(text, onend){
    setSubtitle(text);
    if(!voiceOn || !hasTTS){ var t=setTimeout(onend, estDur(text)); speakCancel=function(){clearTimeout(t);}; return; }
    var done=false; function fire(){ if(done)return; done=true; onend(); }
    var wd=setTimeout(fire, estDur(text)+3500);
    try{
      var u=new SpeechSynthesisUtterance(text); u.lang="es-ES"; if(esVoice)u.voice=esVoice; u.rate=0.82; u.pitch=1;
      u.onend=function(){ clearTimeout(wd); fire(); };
      speechSynthesis.speak(u);
    }catch(e){}
    speakCancel=function(){ clearTimeout(wd); try{speechSynthesis.cancel();}catch(e){} };
  }
  function prime(){ if(!hasTTS) return; try{ var u=new SpeechSynthesisUtterance(" "); u.volume=0; speechSynthesis.speak(u); }catch(e){} }

  blocks.forEach(function(b,i){
    var btn=document.createElement("button"); btn.className=b.cls;
    btn.innerHTML='<span class="bg">'+b.k+'</span><span class="lbl">'+b.lbl+'</span>';
    btn.addEventListener("click",function(){ stopAll(); go(i); });
    tabsEl.appendChild(btn);
  });
  function render(){
    var b=blocks[cur];
    Array.prototype.forEach.call(tabsEl.children,function(c,i){ c.classList.toggle("on",i===cur); });
    $("#openTab").href=b.file+HASH;
    $("#capAct").textContent=b.act; $("#capTitle").textContent=b.lbl; $("#capDesc").textContent="· "+b.desc;
    $("#progFill").style.width=((cur+1)/TOTAL*100)+"%";
    $("#prev").disabled=cur===0; $("#next").disabled=cur===TOTAL-1;
  }
  function loadCur(){ loading.classList.add("on"); frame.src=blocks[cur].file+"?n="+(++nonce)+HASH; }
  function go(i){ cur=Math.max(0,Math.min(TOTAL-1,i)); render(); loadCur(); }

  function whenReady(cb,tries){ tries=tries||0; var w; try{w=frame.contentWindow;}catch(e){} if(w&&w.MCCP){cb(w.MCCP);return;} if(tries>60)return; setTimeout(function(){whenReady(cb,tries+1);},140); }
  function playStep(mccp,k){
    if(!allPlaying) return;
    if(k>=mccp.count){ if(cur<TOTAL-1){ go(cur+1); } else { stopAll(); } return; }
    try{ mccp.go(k); }catch(e){}
    var lines=NARR[cur]||[];
    speak(lines[k]||"", function(){ if(allPlaying) playStep(mccp,k+1); });
  }
  function onBlockReady(){ whenReady(function(mccp){ if(!allPlaying)return; playStep(mccp,0); }); }
  frame.addEventListener("load",function(){ loading.classList.remove("on"); if(allPlaying) onBlockReady(); });

  $("#next").addEventListener("click",function(){ stopAll(); go(cur+1); });
  $("#prev").addEventListener("click",function(){ stopAll(); go(cur-1); });

  function setAllIco(p){ var ico=$("#playAllIco"); if(ico) ico.innerHTML = p?'<rect x="6" y="5" width="4" height="14" rx="1" fill="#04140f"/><rect x="14" y="5" width="4" height="14" rx="1" fill="#04140f"/>':'<path d="M7 5v14l11-7z" fill="#04140f"/>'; var lbl=$("#playAll span"); if(lbl) lbl.textContent = p?"Pausar":"Reproducir todo"; }
  function startAll(){ allPlaying=true; setAllIco(true); prime(); cur=0; render(); loadCur(); }
  function stopAll(){ allPlaying=false; setAllIco(false); if(speakCancel)speakCancel(); try{ if(hasTTS) speechSynthesis.cancel(); }catch(e){} clearSubtitle(); try{ var w=frame.contentWindow; if(w&&w.MCCP) w.MCCP.pause(); }catch(e){} }
  $("#playAll").addEventListener("click",function(){ if(allPlaying) stopAll(); else startAll(); });

  var vb=$("#voiceBtn");
  if(vb){ setVoiceIco(); vb.addEventListener("click",function(){ voiceOn=!voiceOn; if(!hasTTS)voiceOn=false; setVoiceIco(); }); }
  if(!hasTTS && vb){ vb.classList.add("off"); vb.title="Voz no disponible en este navegador"; }

  go(0);
})();
</script>
</body>
</html>
